; PlatformIO Project Configuration File

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

; Auto-detect USB port. Uncomment to pin a specific port:
; upload_port = COM3          ; Windows
; upload_port = /dev/ttyUSB0  ; Linux

build_type = release
build_flags =
    -Os              ; optimize for size
    -DCORE_DEBUG_LEVEL=0  ; strip ESP-IDF debug strings

lib_deps =
    links2004/WebSockets@^2.3.6
