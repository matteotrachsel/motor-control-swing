name: Build & Release Firmware

# Runs on every push to main/master.
# Automatically increments version, builds firmware, and creates a GitHub Release.
# The ESP32 will pick up the new firmware on its next boot (auto-OTA).

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write   # needed to push the version bump and create releases

jobs:
  firmware:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Bump version ──────────────────────────────────────
      # Reads version.txt, adds 1, writes it back, and patches
      # FW_VERSION in main.cpp so the compiled binary knows its version.
      - name: Bump version
        id: ver
        run: |
          CURRENT=$(cat version.txt | tr -d '[:space:]')
          NEW=$(( CURRENT + 1 ))
          echo $NEW > version.txt

          # Whitespace-tolerant substitution for `const int FW_VERSION = N;`
          sed -i -E "s/(const int[[:space:]]+FW_VERSION[[:space:]]*=[[:space:]]*)[0-9]+/\1$NEW/" src/main.cpp

          # Fail loudly if the sed didn't actually update FW_VERSION — keeps
          # version.txt and the compiled binary from drifting out of sync.
          if ! grep -qE "FW_VERSION[[:space:]]*=[[:space:]]*$NEW[[:space:]]*;" src/main.cpp; then
            echo "ERROR: Failed to patch FW_VERSION in src/main.cpp to $NEW"
            grep -n "FW_VERSION" src/main.cpp || true
            exit 1
          fi

          echo "ver=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped: $CURRENT → $NEW"

      # ── 3. Cache PlatformIO toolchain & libraries ─────────────
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      # ── 4. Build ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      # ── 5. Commit the version bump ────────────────────────────
      # [skip ci] prevents this commit from triggering another run.
      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt src/main.cpp
          git commit -m "chore: bump to v${{ steps.ver.outputs.ver }} [skip ci]"
          git push

      # ── 6. Create GitHub Release with firmware.bin ────────────
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.ver }}" \
            --title "Firmware v${{ steps.ver.outputs.ver }}" \
            --notes "$(cat <<'EOF'
          Auto-built from push to \`${{ github.ref_name }}\`

          **Commit:** ${{ github.sha }}
          **Message:** ${{ github.event.head_commit.message }}

          The swing controller will update itself automatically on next boot.
          EOF
          )" \
            .pio/build/esp32dev/firmware.bin#firmware.bin \
            --latest
